apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clubchain-ingress
  namespace: clubchain
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - clubchain.example.edu
      secretName: clubchain-tls
  rules:
    - host: clubchain.example.edu
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: clubchain-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clubchain-frontend
                port:
                  number: 80

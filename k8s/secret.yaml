apiVersion: v1
kind: Secret
metadata:
  name: clubchain-secrets
  namespace: clubchain
type: Opaque
stringData:
  DATABASE_URL: "postgresql://db_user:db_pass@managed-postgres:5432/clubchain?schema=public"
  JWT_ACCESS_SECRET: "replace_with_long_access_secret"
  JWT_REFRESH_SECRET: "replace_with_long_refresh_secret"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@example.com"
  SMTP_PASS: "replace_me"

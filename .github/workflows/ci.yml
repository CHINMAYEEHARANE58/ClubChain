name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clubchain
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clubchain"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clubchain?schema=public
      JWT_ACCESS_SECRET: test_access_secret_123456789
      JWT_REFRESH_SECRET: test_refresh_secret_123456789
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      ALLOWED_EMAIL_DOMAIN: college.edu
      CORS_ORIGIN: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci --workspaces=false

      - name: Prisma Generate
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  frontend:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --workspaces=false

      - name: Build
        run: npm run build
